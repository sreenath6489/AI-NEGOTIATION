<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive - CURA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
<style>
    body {
        background: radial-gradient(circle at 10% 20%, rgba(167, 122, 95, 0.06) 0%, rgba(184, 144, 112, 0.04) 50%, rgba(250, 249, 246, 1) 100%), #FAF9F6;
        color: #1C1C1C;
        min-height: 100vh;
    }
    .tabs {
        display: flex;
        gap: 15px;
        margin: 30px auto;
        max-width: 1200px;
        border-bottom: 1px solid #E5E1D8;
        padding-bottom: 15px;
        padding-left: 50px;
        padding-right: 50px;
    }
    .tab-btn {
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid #E5E1D8;
        padding: 12px 24px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #6B7280;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 6px;
    }
    .tab-btn:hover {
        color: #000000;
        border-color: rgba(140, 98, 57, 0.3);
    }
    .tab-btn.active {
        background: linear-gradient(135deg, #8C6239 0%, #B89070 100%);
        color: #FFFFFF;
        border: none;
        box-shadow: 0 4px 12px rgba(140, 98, 57, 0.2);
    }
    
    .archive-grid {
        max-width: 1200px;
        margin: 0 auto 60px auto;
        padding: 0 50px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 40px;
    }

    .archive-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 10px 30px rgba(140, 98, 57, 0.05);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .archive-card:hover {
        transform: translateY(-5px);
        border-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 45px rgba(140, 98, 57, 0.12);
    }

    .archive-img-container {
        width: 100%;
        aspect-ratio: 1.25;
        background: #F3F1ED;
        overflow: hidden;
    }

    .archive-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .archive-content {
        padding: 25px;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        justify-content: space-between;
    }

    .archive-details h3 {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        font-weight: 500;
        color: #1C1C1C;
        margin-bottom: 10px;
    }

    .archive-details p {
        font-size: 12.5px;
        color: #6B7280;
        margin: 5px 0;
        line-height: 1.6;
    }

    .status-badge {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 9px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 12px;
    }

    .status-negotiating {
        background: rgba(140, 98, 57, 0.06);
        color: #8C6239;
        border: 1px solid rgba(140, 98, 57, 0.2);
    }
    .status-agreed {
        background: rgba(16, 185, 129, 0.15);
        color: #10B981;
        border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .status-failed {
        background: rgba(239, 68, 68, 0.15);
        color: #EF4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .card-footer-action {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid #E5E1D8;
        padding-top: 20px;
        margin-top: 20px;
    }

    .arrow-link {
        font-size: 16px;
        color: #8C6239;
        text-decoration: none;
        font-weight: bold;
        transition: transform 0.3s;
    }
    .archive-card:hover .arrow-link {
        transform: translateX(5px);
    }
    
    .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 0;
        color: #9CA3AF;
        font-size: 15px;
    }
</style>
</head>

<body>

<nav class="navbar">
    <a href="dashboard.html" class="logo">CURA</a>
    <div class="nav-links">
        <span id="user-display" class="nav-user" style="font-size:12px; color:#666; text-transform:uppercase; letter-spacing:0.05em; margin-right:10px;"></span>
        <a href="dashboard.html">Gallery</a>
        <a href="my-negotiations.html" class="active">Archive</a>
        <a href="sell-item.html">+ Sell Item</a>
        <a href="profile-setup.html">Profile</a>
        <button onclick="signOut()" class="logout-btn">Sign Out</button>
    </div>
</nav>

<div style="max-width: 1200px; margin: 40px auto 10px auto; padding: 0 50px;">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 500; color: #FFFFFF; margin-bottom: 8px;">My Archive</h1>
    <p style="color: #94A3B8; font-size: 13px;">Monitor ongoing autonomous negotiations and review agreed deals.</p>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('buying')" id="tab-buying">Items I'm Buying</button>
    <button class="tab-btn" onclick="switchTab('selling')" id="tab-selling">Items I'm Selling</button>
</div>

<div class="archive-grid" id="negotiations-container">
    <!-- Dynamic cards will be rendered here -->
</div>

<footer>
    <div class="logo" style="font-size:18px;">CURA</div>
    <div class="footer-links">
        <a href="#">Terms of Service</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Shipping & Provenance</a>
        <a href="#">Contact</a>
    </div>
    <div>&copy; 2026 CURA Collective. All Rights Reserved.</div>
</footer>

<script>
const API_HOST = "http://127.0.0.1:8000";
const token = localStorage.getItem("token");
let currentUser = null;
let negotiations = [];
let activeTab = "buying";

// Auth protection
if (!token) {
    window.location.href = "login.html";
} else {
    try {
        currentUser = JSON.parse(localStorage.getItem("user"));
        if (currentUser) {
            document.getElementById("user-display").innerText = `HI, ${currentUser.username}`;
        }
    } catch(e) {
        console.error("Error parsing user session", e);
    }
}

window.onload = function() {
    fetchNegotiations();
};

function fetchNegotiations() {
    const container = document.getElementById("negotiations-container");
    container.innerHTML = `<div class="empty-state">Loading archive files...</div>`;

    fetch(`${API_HOST}/api/negotiations/`, {
        headers: { "Authorization": `Token ${token}` }
    })
    .then(res => res.json())
    .then(data => {
        negotiations = data;
        renderNegotiations();
    })
    .catch(err => {
        console.error("Error loading negotiations:", err);
        container.innerHTML = `<div class="empty-state" style="color: #b6493c;">Failed to load archive. Make sure the server is running.</div>`;
    });
}

function switchTab(tab) {
    activeTab = tab;
    document.getElementById("tab-buying").classList.toggle("active", tab === "buying");
    document.getElementById("tab-selling").classList.toggle("active", tab === "selling");
    renderNegotiations();
}

function renderNegotiations() {
    const container = document.getElementById("negotiations-container");
    container.innerHTML = "";

    const filtered = negotiations.filter(neg => {
        const itemSellerId = neg.item.seller.id;
        const buyerId = neg.buyer.id;

        if (activeTab === "buying") {
            return buyerId === currentUser.id;
        } else {
            return itemSellerId === currentUser.id;
        }
    });

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <p>No active records in this folder.</p>
                <a href="dashboard.html" style="color: #000; font-weight:bold; text-decoration: underline; font-size: 13px; display: inline-block; margin-top: 15px;">
                    Explore Gallery Collection
                </a>
            </div>
        `;
        return;
    }

    filtered.forEach(neg => {
        const item = neg.item;
        const card = document.createElement("div");
        card.className = "archive-card";

        const imgUrl = item.image_url && item.image_url.trim() !== "" ? item.image_url : "https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=500";
        const badgeClass = `status-${neg.status}`;
        
        let badgeLabel = neg.status;
        if (neg.status === "agreed") badgeLabel = `Agreed price: ₹${parseFloat(neg.agreed_price).toLocaleString('en-IN')}`;
        
        let counterPartyLabel = "";
        if (activeTab === "buying") {
            counterPartyLabel = `Seller: <strong>${item.seller.username}</strong> (${item.seller_strategy} strategy)`;
        } else {
            counterPartyLabel = `Buyer: <strong>${neg.buyer.username}</strong> (${neg.buyer_strategy} strategy)`;
        }

        card.innerHTML = `
            <div class="archive-img-container">
                <img src="${imgUrl}" alt="${item.title}">
            </div>
            <div class="archive-content">
                <div class="archive-details">
                    <h3>${item.title}</h3>
                    <p>${counterPartyLabel}</p>
                    <p>Quoted Price: <strong>₹${parseFloat(item.quoted_price).toLocaleString('en-IN')}</strong></p>
                    <span class="status-badge ${badgeClass}">${badgeLabel}</span>
                </div>
                <div class="card-footer-action">
                    <span style="font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:#777;">
                        ${neg.status === 'negotiating' ? 'Open Dialogue' : 'Review Contract'}
                    </span>
                    <a href="negotiation-chat.html?id=${neg.id}" class="arrow-link" style="display:flex; align-items:center;">
                        <span style="font-size:11px; font-weight:bold; letter-spacing:0.05em; text-transform:uppercase; margin-right:8px; display:inline-block;">View</span> →
                    </a>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function signOut() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
